meta:
  name: "ESP32 LoRa Gateway"
  version: "0.1.0"
  description: "ESP32-WROOM-32 with SX1276 LoRa module for 868MHz IoT gateway"
  tags: ["esp32", "lora", "gateway", "sx1276", "868mhz", "spi"]

board:
  width_mm: 55
  height_mm: 50
  layers: 2

components:
  U1:
    id: "U1"
    ref: "U1"
    type: "ESP32-WROOM-32"
    footprint: "ESP32-WROOM-32"
    pins:
      GND:    {type: "power", net: "GND"}
      VCC:    {type: "power", net: "VCC_3V3"}
      EN:     {type: "input", net: "VCC_3V3"}
      GPIO18: {type: "bidirectional", net: "SPI_CLK"}
      GPIO19: {type: "bidirectional", net: "SPI_MISO"}
      GPIO23: {type: "bidirectional", net: "SPI_MOSI"}
      GPIO5:  {type: "bidirectional", net: "LORA_CS"}
      GPIO4:  {type: "bidirectional", net: "LORA_DIO0"}
      GPIO2:  {type: "bidirectional", net: "LORA_RST"}
  U2:
    id: "U2"
    ref: "U2"
    type: "SX1276IMLTRT 868MHz"
    footprint: "SX1276-QFN28"
    pins:
      VDD:   {type: "power", net: "VCC_3V3"}
      GND:   {type: "power", net: "GND"}
      SCK:   {type: "input", net: "SPI_CLK"}
      MISO:  {type: "output", net: "SPI_MISO"}
      MOSI:  {type: "input", net: "SPI_MOSI"}
      NSS:   {type: "input", net: "LORA_CS"}
      DIO0:  {type: "output", net: "LORA_DIO0"}
      RESET: {type: "input", net: "LORA_RST"}
  U3:
    id: "U3"
    ref: "U3"
    type: "AMS1117-3.3"
    footprint: "SOT-223"
    pins:
      INPUT:  {type: "power", net: "VCC_5V"}
      OUTPUT: {type: "output", net: "VCC_3V3"}
      GND:    {type: "power", net: "GND"}
  C1:
    id: "C1"
    ref: "C1"
    type: "CAP"
    value: "100nF"
    footprint: "0402"
    pins:
      P1: {type: "passive", net: "VCC_3V3"}
      P2: {type: "passive", net: "GND"}
  C2:
    id: "C2"
    ref: "C2"
    type: "CAP"
    value: "10uF"
    footprint: "0805"
    pins:
      P1: {type: "passive", net: "VCC_3V3"}
      P2: {type: "passive", net: "GND"}
  J1:
    id: "J1"
    ref: "J1"
    type: "USB-C-16P"
    footprint: "USB-C-16P-SMD"
    pins:
      VBUS: {type: "power", net: "VCC_5V"}
      GND:  {type: "power", net: "GND"}

nets:
  VCC_5V:   {id: "VCC_5V",name: "VCC_5V",type: "power",  nodes:["J1.VBUS","U3.INPUT"]}
  VCC_3V3:  {id: "VCC_3V3",name: "VCC_3V3",type: "power",  nodes:["U3.OUTPUT","U1.VCC","U1.EN","U2.VDD","C1.P1","C2.P1"]}
  GND:      {id: "GND",name: "GND",type: "ground", nodes:["J1.GND","U1.GND","U2.GND","U3.GND","C1.P2","C2.P2"]}
  SPI_CLK:  {id: "SPI_CLK",name: "SPI_CLK",type: "clock",  nodes:["U1.GPIO18","U2.SCK"]}
  SPI_MISO: {id: "SPI_MISO",name: "SPI_MISO",type: "signal", nodes:["U1.GPIO19","U2.MISO"]}
  SPI_MOSI: {id: "SPI_MOSI",name: "SPI_MOSI",type: "signal", nodes:["U1.GPIO23","U2.MOSI"]}
  LORA_CS:  {id: "LORA_CS",name: "LORA_CS",type: "signal", nodes:["U1.GPIO5","U2.NSS"]}
  LORA_DIO0: {id: "LORA_DIO0",name: "LORA_DIO0",type: "signal",nodes:["U1.GPIO4","U2.DIO0"]}
  LORA_RST: {id: "LORA_RST",name: "LORA_RST",type: "signal", nodes:["U1.GPIO2","U2.RESET"]}
