meta:
  name: "ESP32 I2C Sensor Board"
  version: "0.1.0"
  description: "ESP32-WROOM-32 with BME280 temperature/humidity/pressure sensor via I2C"
  tags: ["esp32", "i2c", "sensor", "bme280", "wifi", "ble"]

board:
  width_mm: 50
  height_mm: 40
  layers: 2

components:
  U1:
    id: "U1"
    ref: "U1"
    type: "ESP32-WROOM-32"
    footprint: "ESP32-WROOM-32"
    pins:
      GND:    {type: "power",   net: "GND"}
      VCC:    {type: "power",   net: "VCC_3V3"}
      EN:     {type: "input",   net: "VCC_3V3"}
      GPIO21: {type: "bidirectional", net: "I2C_SDA"}
      GPIO22: {type: "bidirectional", net: "I2C_SCL"}
  U2:
    id: "U2"
    ref: "U2"
    type: "BME280"
    footprint: "LGA-8"
    pins:
      VDD:  {type: "power",   net: "VCC_3V3"}
      GND:  {type: "power",   net: "GND"}
      SDA:  {type: "bidirectional", net: "I2C_SDA"}
      SCK:  {type: "input",   net: "I2C_SCL"}
      CSB:  {type: "input",   net: "VCC_3V3"}
      SDO:  {type: "input",   net: "GND"}
  U3:
    id: "U3"
    ref: "U3"
    type: "AMS1117-3.3"
    footprint: "SOT-223"
    pins:
      INPUT:  {type: "power",   net: "VCC_5V"}
      OUTPUT: {type: "output",  net: "VCC_3V3"}
      GND:    {type: "power",   net: "GND"}
  R1:
    id: "R1"
    ref: "R1"
    type: "RES"
    value: "4.7k"
    footprint: "0402"
    pins:
      P1: {type: "passive", net: "VCC_3V3"}
      P2: {type: "passive", net: "I2C_SDA"}
  R2:
    id: "R2"
    ref: "R2"
    type: "RES"
    value: "4.7k"
    footprint: "0402"
    pins:
      P1: {type: "passive", net: "VCC_3V3"}
      P2: {type: "passive", net: "I2C_SCL"}
  C1:
    id: "C1"
    ref: "C1"
    type: "CAP"
    value: "100nF"
    footprint: "0402"
    pins:
      P1: {type: "passive", net: "VCC_3V3"}
      P2: {type: "passive", net: "GND"}
  C2:
    id: "C2"
    ref: "C2"
    type: "CAP"
    value: "10uF"
    footprint: "0805"
    pins:
      P1: {type: "passive", net: "VCC_3V3"}
      P2: {type: "passive", net: "GND"}
  J1:
    id: "J1"
    ref: "J1"
    type: "USB-C-16P"
    footprint: "USB-C-16P-SMD"
    pins:
      VBUS: {type: "power",  net: "VCC_5V"}
      GND:  {type: "power",  net: "GND"}

nets:
  VCC_5V:    {id: "VCC_5V",   name: "VCC_5V",   type: "power",  nodes: ["J1.VBUS","U3.INPUT"]}
  VCC_3V3:   {id: "VCC_3V3",  name: "VCC_3V3",  type: "power",  nodes: ["U3.OUTPUT","U1.VCC","U1.EN","U2.VDD","U2.CSB","C1.P1","C2.P1","R1.P1","R2.P1"]}
  GND:       {id: "GND",      name: "GND",       type: "ground", nodes: ["J1.GND","U3.GND","U1.GND","U2.GND","U2.SDO","C1.P2","C2.P2"]}
  I2C_SDA:   {id: "I2C_SDA",  name: "I2C_SDA",  type: "data",   nodes: ["U1.GPIO21","U2.SDA","R1.P2"]}
  I2C_SCL:   {id: "I2C_SCL",  name: "I2C_SCL",  type: "clock",  nodes: ["U1.GPIO22","U2.SCK","R2.P2"]}
