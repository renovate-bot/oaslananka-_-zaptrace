name: Proof Pack

on:
  push:
    branches: [main]
    paths:
      - "zaptrace/proof/**"
      - "examples/**"
      - "proof/**"
  pull_request:
    branches: [main]
    paths:
      - "zaptrace/proof/**"
      - "examples/**"
      - "proof/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proof:
    name: Run proof packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run proof packs on examples
        run: |
          uv run python -c "
          from pathlib import Path
          from zaptrace.proof import ProofPack
          for proof_dir in Path('examples').glob('*/proof.yaml'):
              pack = ProofPack.load(proof_dir)
              pack.run()
              pack.bundle(proof_dir.parent / 'output')
              print(f'{pack.manifest.name}: stable_id={pack.stable_id[:16]}...')
              print(pack.summary)
              assert pack.passed, f'Proof pack {pack.manifest.name} FAILED'
          "
