name: KiCad Oracle

on:
  push:
    branches: [main]
    paths:
      - "zaptrace/export/kicad.py"
      - "scripts/ci_kicad_oracle.py"
      - "examples/**"
  pull_request:
    branches: [main]
    paths:
      - "zaptrace/export/kicad.py"
      - "scripts/ci_kicad_oracle.py"
      - "examples/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  oracle:
    name: Run KiCad oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run oracle checks
        run: uv run python scripts/ci_kicad_oracle.py --output kicad-oracle-summary.json

      - name: Upload KiCad oracle evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: kicad-oracle-evidence
          path: |
            kicad-oracle-check.json
            kicad-oracle-summary.json
          if-no-files-found: warn
