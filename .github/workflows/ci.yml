name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate maturity metadata
        run: |
          python -m json.tool .bestpractices.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          required = [
              'README.md', 'LICENSE', 'CONTRIBUTING.md', 'CODE_OF_CONDUCT.md',
              'SECURITY.md', 'SUPPORT.md', 'GOVERNANCE.md', 'MAINTAINERS.md',
              'CHANGELOG.md', 'docs/repo-maturity-report.md',
              'docs/openssf-evidence.md', 'docs/openssf-gap-analysis.md',
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit(f'Missing required maturity files: {missing}')
          PY
