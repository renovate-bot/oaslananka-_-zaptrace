name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Release quality gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(uv run python -c 'import zaptrace; print(zaptrace.__version__)')"

      - name: Run Python quality gates
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pytest --cov=zaptrace --cov-report=term-missing
          uv run python scripts/ci_smoke.py gerber
          uv run python scripts/ci_smoke.py proof

      - name: Run Rust quality gates
        run: |
          cargo fmt --manifest-path zaptrace_core/Cargo.toml --check
          cargo clippy --manifest-path zaptrace_core/Cargo.toml -- -D warnings
          cargo test --manifest-path zaptrace_core/Cargo.toml

  python-distributions:
    name: Build Python distributions
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Build package
        run: uv build

      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  rust-wheels:
    name: Build Rust wheels (${{ matrix.target }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
      fail-fast: false

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Select maturin args
        id: maturin
        shell: bash
        run: |
          args="--release --manifest-path zaptrace_core/Cargo.toml --out dist"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "args=$args -i /opt/python/cp313-cp313/bin/python" >> "$GITHUB_OUTPUT"
          else
            echo "args=$args -i $(uv python find "$PYTHON_VERSION")" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Rust wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: ${{ steps.maturin.outputs.args }}
          manylinux: auto

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # PyPI and GHCR publishing are intentionally not automatic in this pre-1.0
  # release workflow. PyPI currently rejects the project name and GHCR requires
  # repository/package permissions outside the codebase. GitHub Releases carry
  # the verified source/wheel artifacts; external publishing should be enabled
  # later with explicit credentials and package-name policy.

  github-release:
    name: Create GitHub release
    needs: [python-distributions, rust-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-distributions
          path: release-artifacts

      - name: Download Rust wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: wheel-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: release-artifacts
          artifact-name: zaptrace-${{ github.ref_name }}.spdx.json
          output-file: release-artifacts/zaptrace-${{ github.ref_name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: release-artifacts/**/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: release-artifacts/**/*
