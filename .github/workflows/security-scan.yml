name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.11"

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run uv audit
        run: uv audit

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Install semgrep
        run: pip install semgrep==1.168.0

      - name: Run Semgrep diagnostics
        run: |
          semgrep scan --config p/default --json --output semgrep-results.json || true
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("semgrep-results.json")
          if not path.exists():
              print("No Semgrep diagnostics JSON produced")
              raise SystemExit(0)
          data = json.loads(path.read_text(encoding="utf-8"))
          results = data.get("results", [])
          print(f"Semgrep diagnostics findings: {len(results)}")
          for result in results:
              extra = result.get("extra", {})
              start = result.get("start", {})
              print("::warning::"
                    f"{result.get('check_id')} "
                    f"{result.get('path')}:{start.get('line')} "
                    f"{extra.get('message', '')}")
          PY

      - name: Run Semgrep
        run: semgrep scan --config p/default --error --sarif --output semgrep-results.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        if: always()

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
