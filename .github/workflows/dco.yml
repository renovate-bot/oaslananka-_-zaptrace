name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF" --depth=1
      - name: Check DCO sign-offs for code-sensitive changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python scripts/ci_dco_check.py --base "origin/$BASE_REF" --head HEAD
