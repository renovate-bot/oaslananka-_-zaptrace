name: Bug Report
description: Report an implementation, documentation, or verification bug
title: "[Bug]: "
labels: ["bug", "status:needs-audit"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security vulnerabilities, use the security policy instead of a public issue.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and why is it wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should ZapTrace have done instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Commands, design files, or code needed to reproduce the issue.
      placeholder: |
        1. Run `zaptrace parse examples/.../design.yaml`
        2. Run `zaptrace ...`
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:architecture
        - area:agent-runtime
        - area:eda-interop
        - area:verification
        - area:manufacturing
        - area:supply-chain
        - area:security
        - area:ui
        - area:ci
        - area:docs
        - area:plugin
        - unknown
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - priority:P0 - release/safety blocker
        - priority:P1 - next milestone
        - priority:P2 - important but not blocking
        - priority:P3 - future/research
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ZapTrace version
      description: Output of `uv run python -c "import zaptrace; print(zaptrace.__version__)"`
      placeholder: "0.2.2"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 15"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence and logs
      description: Paste logs, proof-pack snippets, CI URLs, screenshots, or generated artifacts.
      render: shell

  - type: checkboxes
    id: safety
    attributes:
      label: Safety / claims check
      options:
        - label: This is not a security vulnerability.
          required: true
        - label: This bug does not claim fabrication approval or no-human-review correctness.
          required: true
