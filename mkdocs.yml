site_name: ZapTrace
site_description: Agent-native electronics design core — PCB EDA via LLM agents and MCP
site_url: https://oaslananka.github.io/zaptrace
repo_url: https://github.com/oaslananka/zaptrace
repo_name: oaslananka/zaptrace

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started: GETTING_STARTED.md
  - Architecture: ARCHITECTURE.md
  - API Reference: api-rest-production.md
  - Safety & Non-claims: SAFETY.md
  - Roadmap: ROADMAP.md
  - FAQ: FAQ.md

  - MCP Integration:
      - Quickstart: mcp/quickstart.md
      - Tools Reference: mcp/tools-reference.md
      - Examples: mcp/examples.md
      - Security: mcp/security.md

  - Analysis:
      - Electrical Analysis: analysis/electrical-analysis.md

  - Manufacturing:
      - BOM Export: manufacturing/bom-export.md
      - Gerber Export: manufacturing/gerber-export.md
      - Evidence Adapters: manufacturing/evidence-adapters.md
      - Export Capability Matrix: manufacturing/export-capability-matrix.md
      - BOM Provider Contract: manufacturing/bom-provider-contract.md

  - Interoperability:
      - Cross-EDA Readiness: interop/cross-eda-readiness.md
      - Test Corpus Plan: interop/test-corpus-plan.md

  - Design:
      - Agent Workflow Runtime: design/agent-workflow-runtime.md
      - Autonomous Specialist Agents: design/autonomous-specialist-agents.md
      - Autonomous Synthesis & Verification Loop: design/autonomous-synthesis.md
      - Hardware IR: design/hardware-ir.md
      - Plugin Runtime: design/plugin-runtime.md

  - Product:
      - Manifesto: product/manifesto.md
      - Review Studio: product/review-studio.md
      - Static Review Viewer: product/static-review-viewer.md
      - Competitor Matrix: strategy/competitor-matrix.md

  - Security:
      - Agent Runtime Threat Model: security/agent-runtime-threat-model.md

  - Plugins:
      - Development Guide: plugins/development-guide.md

  - CI/CD:
      - GitHub PR Bot: ci/github-pr-bot.md

  - Benchmarks:
      - KiCad Round-trip Scorecard: benchmarks/kicad-roundtrip-scorecard.md
