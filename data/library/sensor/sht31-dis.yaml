id: "sht31-dis"
name: "SHT31-DIS"
category: sensor
manufacturer: "Sensirion"
mpn: "SHT31-DIS-B"
description: "Digital humidity and temperature sensor, I2C"
datasheet: "https://www.sensirion.com/media/documents/213E6C0C/63A5F569/Sensirion_Humidity_Sensors_SHT3x_Datasheet_digital.pdf"
package: "DFN-8"
footprint: "SHT31-DIS-DFN8"
lifecycle: "active"
voltage_supply: "3.3"
pins:
