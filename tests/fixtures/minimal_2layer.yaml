name: minimal_2layer
board:
  width_mm: 50.0
  height_mm: 40.0
  layers: 2
components:
  - reference: R1
    footprint: 0805
    value: 10k
    x_mm: 10.0
    y_mm: 20.0
    layer: top
  - reference: C1
    footprint: 0603
    value: 100nF
    x_mm: 30.0
    y_mm: 20.0
    layer: top
nets:
  - name: VCC
    nodes:
      - component_ref: R1
        pin: "1"
      - component_ref: C1
        pin: "1"
  - name: GND
    nodes:
      - component_ref: R1
        pin: "2"
      - component_ref: C1
        pin: "2"
