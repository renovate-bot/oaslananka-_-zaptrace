meta:
  name: AnalysisFixture
components:
  u1:
    ref: U1
    type: mcu
    properties:
      current_a: 0.12
      power_w: 0.35
      theta_ja_c_per_w: 55
  j1:
    ref: J1
    type: connector
nets:
  usb_dp:
    name: USB_D+
    type: differential
    constraints:
      impedance_target: 90
      length_match_group: USB
      max_length_mm: 60
    nodes: [U1.DP, J1.DP]
  usb_dn:
    name: USB_D-
    type: differential
    constraints:
      impedance_target: 90
      length_match_group: USB
      max_length_mm: 60
    nodes: [U1.DN, J1.DN]
  vcc:
    name: VCC_3V3
    type: power
    nodes: [U1.VCC]
board:
  width_mm: 50
  height_mm: 30
routing:
  traces:
    - {net_id: usb_dp, layer: F.Cu, start: [0, 0], end: [20, 0], width: 0.15}
    - {net_id: usb_dn, layer: F.Cu, start: [0, 1], end: [20.4, 1], width: 0.15}
    - {net_id: vcc, layer: F.Cu, start: [0, 2], end: [25, 2], width: 0.3}
